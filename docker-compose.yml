# Wood & More — API + Web app (Neon cloud PostgreSQL)
# Database runs on Neon; credentials are in backend/.env

services:
  api:
    build: ./backend
    env_file: ./backend/.env
    ports:
      - "3000:3000"

  app:
    build: .
    ports:
      - "8080:80"
    volumes:
      - ./config.api.json:/usr/share/nginx/html/config.json:ro
    depends_on:
      - api
